---
- name: Preflight VMware automation
  hosts: localhost
  gather_facts: false

  vars:
    required_bins:
      - python3

  tasks:
    - name: Verify vmware_sites variable exists and is a non-empty list
      ansible.builtin.assert:
        that:
          - vmware_sites is defined
          - vmware_sites is sequence
          - vmware_sites is not string
          - vmware_sites | length > 0
        fail_msg: >-
          Variable racine invalide: vmware_sites doit être une liste non vide.
          Exemple: vmware_sites: [ { name: site1, vcenters: [...] } ]

    - name: Validate each site object
      ansible.builtin.assert:
        that:
          - item.name is defined
          - item.name | string | length > 0
          - item.vcenters is defined
          - item.vcenters is sequence
          - item.vcenters | length > 0
        fail_msg: >-
          Site invalide '{{ item.name | default('unknown') }}':
          champs requis manquants (name, vcenters).
      loop: "{{ vmware_sites }}"
      loop_control:
        label: "{{ item.name | default('site-unknown') }}"

    - name: Flatten vCenter list
      ansible.builtin.set_fact:
        preflight_vcenters: "{{ vmware_sites | map(attribute='vcenters') | list | flatten }}"

    - name: Validate each vCenter object
      ansible.builtin.assert:
        that:
          - item.name is defined
          - item.hostname is defined
          - item.hostname | string | length > 0
          - item.username is defined
          - item.username | string | length > 0
          - item.password is defined
          - item.password | string | length > 0
          - item.datacenters is defined
          - item.datacenters is sequence
          - item.datacenters | length > 0
        fail_msg: >-
          vCenter invalide '{{ item.name | default('unknown-vcenter') }}':
          champs requis: hostname, username, password, datacenters.
      loop: "{{ preflight_vcenters }}"
      loop_control:
        label: "{{ item.name | default('vcenter-unknown') }}"

    - name: Flatten datacenter list
      ansible.builtin.set_fact:
        preflight_datacenters: "{{ preflight_vcenters | map(attribute='datacenters') | list | flatten }}"

    - name: Validate each datacenter object
      ansible.builtin.assert:
        that:
          - item.name is defined
          - item.name | string | length > 0
          - item.clusters is defined
          - item.clusters is sequence
          - item.clusters | length > 0
        fail_msg: >-
          Datacenter invalide '{{ item.name | default('unknown-datacenter') }}':
          champs requis: name, clusters.
      loop: "{{ preflight_datacenters }}"
      loop_control:
        label: "{{ item.name | default('dc-unknown') }}"

    - name: Flatten cluster list
      ansible.builtin.set_fact:
        preflight_clusters: "{{ preflight_datacenters | map(attribute='clusters') | list | flatten }}"

    - name: Validate each cluster object
      ansible.builtin.assert:
        that:
          - item.name is defined
          - item.name | string | length > 0
          - item.hosts is defined
          - item.hosts is sequence
          - item.host_rules is defined
          - item.host_rules is mapping
          - item.host_rules.affinity is defined
          - item.host_rules.affinity is sequence
          - item.host_rules.anti_affinity is defined
          - item.host_rules.anti_affinity is sequence
          - item.dvswitches is defined
          - item.dvswitches is sequence
          - item.dvportgroups is defined
          - item.dvportgroups is sequence
        fail_msg: >-
          Cluster invalide '{{ item.name | default('unknown-cluster') }}':
          champs requis: hosts, host_rules.affinity, host_rules.anti_affinity,
          dvswitches, dvportgroups.
      loop: "{{ preflight_clusters }}"
      loop_control:
        label: "{{ item.name | default('cluster-unknown') }}"

    - name: Validate each ESXi host entry
      ansible.builtin.assert:
        that:
          - item.1.hostname is defined
          - item.1.hostname | string | length > 0
          - item.1.username is defined
          - item.1.username | string | length > 0
          - item.1.password is defined
          - item.1.password | string | length > 0
        fail_msg: >-
          Hôte ESXi invalide dans cluster '{{ item.0.name | default('unknown-cluster') }}':
          hostname, username et password sont requis.
      loop: "{{ preflight_clusters | subelements('hosts', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name | default('cluster-unknown') }} / {{ item.1.hostname | default('esxi-unknown') }}"

    - name: Validate unsupported multipathing keys are absent
      ansible.builtin.assert:
        that:
          - item.1.multipath_policy is not defined
          - item.1.multipath_policies is not defined
        fail_msg: >-
          Multipathing non supporté pour {{ item.1.hostname }}.
          Aucun module Ansible VMware supporté n'est disponible dans les
          collections installées. Supprimez les clés multipath_policy /
          multipath_policies de l'inventaire.
      loop: "{{ preflight_clusters | subelements('hosts', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name | default('cluster-unknown') }} / {{ item.1.hostname | default('esxi-unknown') }}"

    - name: Check required local binaries
      ansible.builtin.command: "which {{ item }}"
      changed_when: false
      loop: "{{ required_bins }}"

    - name: Show preflight summary
      ansible.builtin.debug:
        msg:
          - "Sites validés: {{ vmware_sites | map(attribute='name') | list }}"
          - "vCenters validés: {{ preflight_vcenters | length }}"
          - "Datacenters validés: {{ preflight_datacenters | length }}"
          - "Clusters validés: {{ preflight_clusters | length }}"
