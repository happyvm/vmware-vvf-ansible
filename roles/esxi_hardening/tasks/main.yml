---
- name: Build safe ESXi hardening config map
  ansible.builtin.set_fact:
    esxi_hardening_cfg: "{{ esxi.hardening | default({}) }}"

- name: Enable ESXi lockdown mode when requested
  community.vmware.vmware_host_lockdown:
    hostname: "{{ vc.hostname }}"
    username: "{{ vc.username }}"
    password: "{{ vc.password }}"
    validate_certs: "{{ vc.validate_certs | default(not (vmware_allow_insecure_tls | default(true))) }}"
    esxi_hostname: "{{ esxi.hostname }}"
    lockdown_mode: >-
      {{
        esxi_hardening_cfg.lockdown_mode
        | default(esxi.lockdown_mode | default(esxi_hardening_defaults.lockdown_mode))
      }}
    state: present
  delegate_to: localhost

- name: Apply ESXi hardening advanced options
  community.vmware.vmware_host_config_manager:
    hostname: "{{ vc.hostname }}"
    username: "{{ vc.username }}"
    password: "{{ vc.password }}"
    validate_certs: "{{ vc.validate_certs | default(not (vmware_allow_insecure_tls | default(true))) }}"
    esxi_hostname: "{{ esxi.hostname }}"
    options:
      UserVars.SuppressShellWarning: >-
        {{
          (esxi_hardening_cfg.suppress_shell_warning
          | default(esxi_hardening_defaults.suppress_shell_warning))
          | ternary(1, 0)
        }}
      Config.HostAgent.plugins.hostsvc.esxAdminsGroup: "{{ esxi_hardening_cfg.admin_group | default('') }}"
      DCUI.Access: "{{ esxi_hardening_cfg.dcui_access | default('root') }}"
      Annotations.WelcomeMessage: "{{ esxi_hardening_cfg.banner | default('Authorized access only') }}"
      NTP.ConfiguredServer: >-
        {{
          (esxi.ntp_servers | default(vmware_observability.ntp_servers | default([])))
          | join(',')
          | default(omit)
        }}
      UserVars.ESXiShellInteractiveTimeOut: "{{ esxi_hardening_cfg.esxi_shell_timeout | default(900) }}"
      UserVars.ESXiShellTimeOut: "{{ esxi_hardening_cfg.esxi_shell_timeout | default(900) }}"
      UserVars.SSHEnabled: >-
        {{
          (esxi_hardening_cfg.ssh_enabled | default(esxi_hardening_defaults.ssh_enabled))
          | ternary(1, 0)
        }}
  delegate_to: localhost
