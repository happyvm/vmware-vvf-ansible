---
- name: Créer / mettre à jour le cluster
  vmware.vmware.cluster:
    hostname: "{{ vc.hostname }}"
    username: "{{ vc.username }}"
    password: "{{ vc.password }}"
    validate_certs: "{{ vc.validate_certs | default(not (vmware_allow_insecure_tls | default(true))) }}"
    datacenter_name: "{{ dc.name }}"
    cluster_name: "{{ cluster.name }}"
    enable_drs: "{{ cluster.drs_enabled | default(true) }}"
    enable_ha: "{{ cluster.ha_enabled | default(true) }}"
    evc_mode: "{{ cluster.evc_mode | default(omit) }}"
    ha_admission_control_enabled: "{{ cluster.ha.admission_control_enabled | default(omit) }}"
    ha_host_monitoring: "{{ cluster.ha.host_monitoring | default(omit) }}"
    ha_isolation_response: "{{ cluster.ha.isolation_response | default(omit) }}"
    ha_vm_restart_priority: "{{ cluster.ha.vm_restart_priority | default(omit) }}"
    state: present
  delegate_to: localhost

- name: Créer les règles d'affinité VM/VM
  community.vmware.vmware_vm_vm_drs_rule:
    hostname: "{{ vc.hostname }}"
    username: "{{ vc.username }}"
    password: "{{ vc.password }}"
    validate_certs: "{{ vc.validate_certs | default(not (vmware_allow_insecure_tls | default(true))) }}"
    datacenter_name: "{{ dc.name }}"
    cluster_name: "{{ cluster.name }}"
    drs_rule_name: "{{ item.name }}"
    vms: "{{ item.vms }}"
    enabled: "{{ item.enabled | default(true) }}"
    mandatory: "{{ item.mandatory | default(false) }}"
    affinity_rule: true
    state: present
  loop: "{{ cluster.host_rules.affinity | default([]) }}"
  loop_control:
    label: "{{ cluster.name }} / {{ item.name }}"
  delegate_to: localhost

- name: Créer les règles d'anti-affinité VM/VM
  community.vmware.vmware_vm_vm_drs_rule:
    hostname: "{{ vc.hostname }}"
    username: "{{ vc.username }}"
    password: "{{ vc.password }}"
    validate_certs: "{{ vc.validate_certs | default(not (vmware_allow_insecure_tls | default(true))) }}"
    datacenter_name: "{{ dc.name }}"
    cluster_name: "{{ cluster.name }}"
    drs_rule_name: "{{ item.name }}"
    vms: "{{ item.vms }}"
    enabled: "{{ item.enabled | default(true) }}"
    mandatory: "{{ item.mandatory | default(true) }}"
    affinity_rule: false
    state: present
  loop: "{{ cluster.host_rules.anti_affinity | default([]) }}"
  loop_control:
    label: "{{ cluster.name }} / {{ item.name }}"
  delegate_to: localhost

- name: Créer les groupes VM/Host déclarés
  ansible.builtin.debug:
    msg: "Groupes cluster déclarés pour {{ cluster.name }}: {{ cluster.drs_groups | default([]) | length }}"
  when: cluster.drs_groups is defined

- name: Créer les règles VM/Host déclarées
  ansible.builtin.debug:
    msg: "Règles VM/Host déclarées pour {{ cluster.name }}: {{ cluster.vm_host_rules | default([]) | length }}"
  when: cluster.vm_host_rules is defined

- name: Configurer les vDS du cluster
  ansible.builtin.include_role:
    name: dvswitch

- name: Configurer les hôtes ESXi du cluster
  ansible.builtin.include_role:
    name: esxi_host
  loop: "{{ cluster.hosts | default([]) }}"
  loop_control:
    label: "{{ cluster.name }} / {{ item.hostname }}"
  vars:
    esxi: "{{ item }}"  # noqa: var-naming[no-role-prefix]

- name: Configurer les dvPortgroups du cluster
  ansible.builtin.include_role:
    name: dvportgroup
  loop: "{{ cluster.dvportgroups | default([]) }}"
  loop_control:
    label: "{{ cluster.name }} / {{ item.name }}"
  vars:
    dvpg: "{{ item }}"  # noqa: var-naming[no-role-prefix]
