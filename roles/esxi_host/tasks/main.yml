---
- name: Ajouter l'hôte ESXi au cluster
  vmware.vmware.esxi_host:
    hostname: "{{ vc.hostname }}"
    username: "{{ vc.username }}"
    password: "{{ vc.password }}"
    validate_certs: "{{ vc.validate_certs | default(not (vmware_allow_insecure_tls | default(true))) }}"
    datacenter_name: "{{ dc.name }}"
    cluster_name: "{{ cluster.name }}"
    esxi_host_name: "{{ esxi.hostname }}"
    esxi_username: "{{ esxi.username }}"
    esxi_password: "{{ esxi.password }}"
    state: present
  delegate_to: localhost

- name: Configurer le DNS de l'hôte ESXi
  community.vmware.vmware_host_dns:
    hostname: "{{ vc.hostname }}"
    username: "{{ vc.username }}"
    password: "{{ vc.password }}"
    validate_certs: "{{ vc.validate_certs | default(not (vmware_allow_insecure_tls | default(true))) }}"
    esxi_hostname: "{{ esxi.hostname }}"
    dns_servers: "{{ esxi.dns_servers | default([]) }}"
    search_domains: "{{ esxi.search_domains | default([]) }}"
    type: static
    state: present
  when: esxi.dns_servers is defined
  delegate_to: localhost

- name: Configurer le NTP de l'hôte ESXi
  community.vmware.vmware_host_ntp:
    hostname: "{{ vc.hostname }}"
    username: "{{ vc.username }}"
    password: "{{ vc.password }}"
    validate_certs: "{{ vc.validate_certs | default(not (vmware_allow_insecure_tls | default(true))) }}"
    esxi_hostname: "{{ esxi.hostname }}"
    ntp_servers: "{{ esxi.ntp_servers | default(vmware_observability.ntp_servers | default([])) }}"
    state: present
  when: esxi.ntp_servers is defined or (vmware_observability is defined and vmware_observability.ntp_servers is defined)
  delegate_to: localhost

- name: Configurer les interfaces VMkernel
  community.vmware.vmware_vmkernel:
    hostname: "{{ vc.hostname }}"
    username: "{{ vc.username }}"
    password: "{{ vc.password }}"
    validate_certs: "{{ vc.validate_certs | default(not (vmware_allow_insecure_tls | default(true))) }}"
    esxi_hostname: "{{ esxi.hostname }}"
    dvswitch_name: "{{ item.dvswitch_name }}"
    portgroup_name: "{{ item.dvportgroup_name }}"
    device: "{{ item.name }}"
    network:
      type: static
      ip_address: "{{ item.ipv4 }}"
      subnet_mask: "{{ item.netmask }}"
    enable_vmotion: "{{ item.services.vMotion | default(false) }}"
    enable_provisioning: "{{ item.services.Provisioning | default(false) }}"
    state: present
  loop: "{{ esxi.vmkernel_interfaces | default([]) }}"
  loop_control:
    label: "{{ esxi.hostname }} / {{ item.name }}"
  delegate_to: localhost

- name: Refuser la configuration multipathing non supportée
  ansible.builtin.assert:
    that:
      - esxi.multipath_policy is not defined
      - esxi.multipath_policies is not defined
    fail_msg: >-
      Multipathing non supporté pour {{ esxi.hostname }}.
      Aucun module Ansible VMware supporté n'est disponible dans les
      collections installées. Supprimez multipath_policy /
      multipath_policies de l'inventaire.

- name: Appliquer le hardening ESXi
  ansible.builtin.include_role:
    name: esxi_hardening

- name: Configurer le syslog ESXi
  ansible.builtin.include_role:
    name: logging_syslog
